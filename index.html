<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glass Clock Widget</title>

<style>

*{
    box-sizing:border-box;
}

body{
    margin:auto;
    font-variant-caps: all-petite-caps;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    -webkit-font-smoothing:antialiased;
}

/* glass widget */

.widget{
    width:95%;
  margin: auto;
  margin-top:5px;
    padding:20px 20px 20px 20px;

    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);

    border-bottom:1px solid rgba(255,255,255,0.3);

    box-shadow:
        0 4px 20px rgba(0,0,0,0.2),
        inset 0 1px 0 rgba(255,255,255,0.25);

    color:black;

    transition: transform .25s ease, box-shadow .25s ease;
}

.widget:hover{
    transform:translateY(-2px);
    box-shadow:
        0 8px 30px rgba(0,0,0,0.25),
        inset 0 1px 0 rgba(255,255,255,0.25);
}

/* greeting */

.greet{
    font-size:clamp(1.8rem,6vw,3rem);
    font-weight:600;
}

/* date */

.date{
    font-family:monospace;
    font-size:clamp(1.2rem,4vw,2.5rem);
    font-weight:400;
    opacity:.85;
}

/* clock */

.clock{
    font-family:monospace;
    font-size:clamp(1.2rem,4vw,2.5rem);
    font-weight:400;
    display:flex;
    align-items:center;
    gap:2px;
}

/* numbers */

.time{
    display:inline-block;
    min-width:26px;
    text-align:center;
    font-weight:600;
}

/* blinking colon */

.colon{
    display:inline-block;
    animation: blink 1s steps(1) infinite;
}

@keyframes blink{
    50%{opacity:0}
}

</style>
</head>

<body>

<div class="widget">

<div class="greet" id="greet"></div>

<div class="date" id="date"></div>

<div class="clock">
<span class="time" id="hour"></span>
<span class="colon">:</span>
<span class="time" id="min"></span>
<span class="colon">:</span>
<span class="time" id="sec"></span>
</div>

</div>

<script>

function displayGreetings(today){
    let hrs = today.getHours();
    let name = "";
    let greet;

    if (hrs < 12)
        greet = "Good Morning " + name;
    else if (hrs <= 17)
        greet = "Good Afternoon " + name;
    else
        greet = "Good Evening " + name;

    document.getElementById("greet").innerHTML = greet;
}

function displayDate(today){

    const days = ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];

    const months = [
        "January","February","March","April","May","June",
        "July","August","September","October","November","December"
    ];

    let dayName = days[today.getDay()];
    let monthName = months[today.getMonth()];
    let date = today.getDate();
    let year = today.getFullYear();

    document.getElementById("date").innerHTML =
    dayName + ", " + monthName + " " + date + " " + year;
}

function displayClock(today){

    let hour = padZeros(twelveHour(today.getHours()));
    let minutes = padZeros(today.getMinutes());
    let seconds = padZeros(today.getSeconds());

    if(today.getHours() >= 12){
        seconds += " pm";
    } else {
        seconds += " am";
    }

    document.getElementById("hour").innerHTML = hour;
    document.getElementById("min").innerHTML = minutes;
    document.getElementById("sec").innerHTML = seconds;
}

function twelveHour(hour){
    if(hour > 12){
        return hour - 12;
    } else if(hour === 0){
        return 12;
    } else {
        return hour;
    }
}

function padZeros(num){
    if(num < 10){
        num = "0" + num;
    }
    return num;
}

function displayWidget(){
    let today = new Date();
    displayGreetings(today);
    displayDate(today);
    displayClock(today);
    setTimeout(displayWidget,500);
}

displayWidget();

</script>

</body>
</html>
